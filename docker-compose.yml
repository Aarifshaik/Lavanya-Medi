services:
  postgres:
    image: postgres:16-alpine
    container_name: medichat
    restart: unless-stopped
    environment:
      POSTGRES_DB: medichat
      POSTGRES_USER: medichat_user
      POSTGRES_PASSWORD: medichat_password
    ports:
      - "5432:5432"
    volumes:
      - medichat_postgres_data:/var/lib/postgresql/data
      - ./gemini-chat-app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  medichat_postgres_data:
